services:
  api:
    build:
      context: .
      dockerfile: infrastructure/docker/api.Dockerfile
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./apps/api:/app/apps/api
      - ./packages:/app/packages
      - ./alembic.ini:/app/alembic.ini
      - ./migrations:/app/migrations
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: rural_weaver
      POSTGRES_USER: rural
      POSTGRES_PASSWORD: rural
    ports:
      - "5432:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rural -d rural_weaver"]
      interval: 5s
      timeout: 5s
      retries: 10
